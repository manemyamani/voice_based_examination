<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Question Submission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Animated Gradient Background */
        body {
            background: linear-gradient(270deg, #f6f2f9, #f3f4f5);
            background-size: 400% 400%;
            animation: gradientBG 8s ease infinite;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px; /* Increased width */
            margin-top: 50px;
        }

        .card {
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: none;
        }

        .form-label {
            font-weight: bold;
        }

        .btn-submit {
            width: 100%;
            background-color: #ff9800;
            border: none;
        }

        .btn-submit:hover {
            background-color: #e68900;
        }

        /* Alert Styling */
        .alert {
            display: none;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            font-weight: bold;
        }

        /* Layout: Question Left - Other Inputs Right */
        .form-layout {
            display: grid;
            grid-template-columns: 1.3fr 1.7fr; /* Left (Question) - Right (Options, Answer, Subject) */
            gap: 20px;
            align-items: start;
        }

        /* Grid for options */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Sidebar Title */
        .admin-title {
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="admin-title">📝 Admin Panel - Add Questions</div>

        <!-- Alert Message -->
        <div id="success-alert" class="alert alert-success text-center">
            ✅ Question submitted successfully!
        </div>

        <form id="question-form">
            <div class="form-layout">
                <!-- Left Side: Question Input -->
                <div class="mb-3">
                    <label class="form-label">Question</label>
                    <textarea name="question" class="form-control" rows="5" required="" style="user-select: auto; height: 300px;"></textarea>
                </div>

                <!-- Right Side: Options, Answer, Subject -->
                <div>
                    <!-- Options Grid (2 per Row) -->
                    <div class="options-grid">
                        <div class="mb-3">
                            <label class="form-label">Option 1</label>
                            <input type="text" name="option1" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Option 2</label>
                            <input type="text" name="option2" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Option 3</label>
                            <input type="text" name="option3" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Option 4</label>
                            <input type="text" name="option4" class="form-control" required>
                        </div>
                    </div>

                    <!-- Correct Answer -->
                    <div class="mb-3">
                        <label class="form-label">Correct Answer</label>
                        <input type="text" name="answer" class="form-control" required>
                    </div>

                    <!-- Subject Dropdown -->
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select name="subject" class="form-select" required>
                            <option value="">Select a subject</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-submit">Submit Question</button>
        </form>
    </div>
</div>

<script>
    document.getElementById("question-form").addEventListener("submit", async function(event) {
        event.preventDefault();

        let formData = new FormData(this);
        let data = Object.fromEntries(formData.entries());

        let response = await fetch("/submit_question/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: new URLSearchParams(data)
        });

        if (response.ok) {
            document.getElementById("success-alert").style.display = "block"; 
            this.reset(); // Clear the form

            setTimeout(() => {
                document.getElementById("success-alert").style.display = "none"; 
            }, 3000);
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
