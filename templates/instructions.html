<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAura Examination System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin: auto;
        }
        h2, h3, p {
            text-align: center;
        }
        ul {
            text-align: center;
            list-style-position: inside;
            padding: 0;
        }
        .button-container {
            text-align: center;
            margin-top: 20px;
        }
        .start-button {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }
        .start-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Instructions for SmartAura Examination System.</h2>
        <h3>General Guidelines.</h3>
        <ul>
            <li>Navigate back to a previous question by saying "Previous question."</li>
        </ul>
        <h3>Acknowledgment</h3>
        <p>By proceeding, you agree to follow the rules and guidelines.</p>
        <div class="button-container">
            <button id="startButton" class="start-button">If you are ready to begin the test, say "Start Exam"</button>
        </div>
    </div>

    <script>
        // Function to start the exam
        function startExam() {
            console.log("Redirecting to exam page...");
            window.location.href = "/exam"; // Redirect to exam page
        }

        // Function to read text aloud
        function readInstructions() {
            const text = document.body.innerText;
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = "en-US";
            speech.rate = 1.0;
            speech.volume = 1;
            speech.pitch = 1;
            speechSynthesis.speak(speech);
        }

        // Initialize Speech Recognition
        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.continuous = true;  // Keep listening after first result
            recognition.interimResults = false;
        } else {
            alert("Speech recognition is not supported in this browser.");
        }

        // Function to start listening
        function startListening() {
            if (recognition) {
                console.log("Listening for commands...");
                recognition.start();
            }
        }

        // When speech is detected and recognized
        recognition.onresult = function(event) {
            let command = event.results[event.results.length - 1][0].transcript.toLowerCase();
            console.log("Recognized command:", command);

            if (command.includes("start exam")) {
                startExam();
            } else {
                speakErrorMessage();
            }
        };

        // Function to speak an error message if command is unrecognized
        function speakErrorMessage() {
            const speech = new SpeechSynthesisUtterance("Command not recognized. Please try again.");
            speech.lang = "en-US";
            speech.rate = 1.0;
            speech.volume = 1;
            speech.pitch = 1;
            speechSynthesis.speak(speech);
        }

        // Error handling
        recognition.onerror = function(event) {
            console.error("Speech Recognition Error:", event.error);
            if (event.error === "not-allowed") {
                alert("Please allow microphone access and try again.");
            }
        };

        recognition.onend = function() {
            console.log("Speech recognition stopped. Restarting...");
            setTimeout(startListening, 500); // Restart listening after a short delay
        };

        // Automatically start speech recognition when page loads
        window.onload = function() {
            readInstructions();
            setTimeout(startListening, 3000); // Start listening after 3 seconds
        };

    </script>
</body>
</html>
